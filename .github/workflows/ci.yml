name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: macos-latest
    # The quality gate is typecheck + lint + unit tests; it never launches
    # Electron, so skip the (large, flaky) binary download.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
